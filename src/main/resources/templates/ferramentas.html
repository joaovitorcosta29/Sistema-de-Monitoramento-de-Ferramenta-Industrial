<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Lista de Ferramentas</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-10">
                        <div class="card shadow">
                            <div class="card-header bg-dark text-white p-3">
                                <h4 class="mb-0">Lista de Ferramentas</h4>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-striped table-hover align-middle mb-0">
                                        <thead class="table-light">
                                            <tr>
                                                <th scope="col" class="ps-3">ID</th>
                                                <th scope="col">Nome</th>
                                                <th scope="col">Horas de Uso</th>
                                                <th scope="col">Vida Útil Máxima</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="ferramenta : ${ferramentas}">
                                                <th scope="row" class="ps-3" th:text="${ferramenta.id}">1</th>
                                                <td th:text="${ferramenta.nome}">Furadeira</td>
                                                <td><span th:text="${ferramenta.horasUso}">0</span> h</td>
                                                <td><span th:text="${ferramenta.vidaUtilMaxima}">100</span> h</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div> 
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
